name: Lighthouse + a11y

on:
  pull_request:
    paths:
      - 'src/**'
      - 'content/**'
      - 'public/**'
      - 'portfolio-config.json'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.*'
      - 'tsconfig.json'
      - '.lighthouserc.json'
      - '.github/workflows/lighthouse.yml'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Lighthouse CI
        run: npx -y @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - run: npm run e2e
        env:
          # Stub external AI APIs so CI doesn't burn quota
          DISABLE_GOOGLE: 'true'
